services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - dbdata:/app/data
    restart: unless-stopped
    depends_on:
      - llama
    deploy:
      resources:
        limits:
          memory: 512M

  llama:
    image: ghcr.io/ggml-org/llama.cpp:server
    ports:
      - "8080:8080"
    volumes:
      - ./models:/models
    command: >
      --model /models/qwen2.5-7b-instruct-q4_k_m.gguf
      --host 0.0.0.0
      --port 8080
      --ctx-size 4096
      --n-predict 1024
      --threads 4
      --parallel 2
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 6G

volumes:
  dbdata:
